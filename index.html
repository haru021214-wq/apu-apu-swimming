/* 시작 */
function startGame() {

  opening.style.display = "none";
  document.getElementById("gameContainer").style.display = "flex";

  endScreen.style.display = "none";

  ui.style.display = "block";
  canvas.style.display = "block";
  document.getElementById("homeBtn").style.display = "block";

  playClick();

  pickRandomAnswers();
  setupUI();

  setTimeout(() => {
    resizeCanvas();
  }, 50);
}

document.getElementById("homeBtn").addEventListener("click", () => {
  playClick();
  goIntro();

});

document.getElementById("retryBtn").addEventListener("click", () => {
  playClick();
  gameFinished = false;
  bgm.currentTime = 0;
  bgm.play();

  endScreen.style.display = "none";
  ui.style.display = "block";
  video.style.display = "block";
  document.getElementById("homeBtn").style.display = "block";
  canvas.style.display = "block";
  startGame();

});


/* 랜덤 */
function pickRandomAnswers() {
  const shuffled = [...allAnswers].sort(() => Math.random() - 0.5);
  answers = shuffled.slice(0, 7);
  foundCount = 0;

  answers.forEach(a => {
    a.found = false;
  });
}

function setupUI() {
  ui.innerHTML = "";
  answers.forEach(a => {
    const img = document.createElement("img");
    img.id = a.id;
    img.src = a.icon;
    ui.appendChild(img);
  });
}

/* 캔버스 (영상 기준으로 맞춤) */
function resizeCanvas() {

  canvas.width = gameArea.clientWidth;
  canvas.height = gameArea.clientHeight;

}
video.addEventListener("loadeddata", resizeCanvas);
window.addEventListener("resize", resizeCanvas);

/* 클릭 (영상 기준 좌표) */
canvas.addEventListener("click", (e) => {

  const rect = gameArea.getBoundingClientRect();

  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top) / rect.height;

  answers.forEach(a => {
    if (a.found) return;

    const dx = x - a.x;
    const dy = y - a.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < a.r) {
      clickSound.currentTime = 0;
      clickSound.play();
      a.found = true;
      foundCount++;

      

      const img = document.getElementById(a.id);
      if (img) img.style.opacity = 0.3;

      showPopup(a);

      if (foundCount === answers.length) {
        gameFinished = true;
      }
    }
  });
});

/* 팝업 */
function showPopup(a) {
  popupVideo.src = a.video;
  popupVideo.currentTime = 0;
  popupText.innerText = a.text;

  popup.style.display = "flex";
}

/* 닫기 */
popup.addEventListener("click", () => {
  popup.style.display = "none";

  if (gameFinished) {

    ui.style.display = "none";
    canvas.style.display = "none";

    bgm.pause();
    bgm.currentTime = 0;

    successSound.currentTime = 0;
    successSound.play();

    setTimeout(() => {
      endScreen.style.display = "flex";
    }, 100);
  }
});

/* 다시 */
function restart() {
  location.reload();
}

function goIntro() {

  opening.style.display = "flex";

  titleUI.style.display = "none";
  howUI.style.display = "none";
  endScreen.style.display = "none";
  bgm.pause();
  bgm.currentTime = 0;

  document.getElementById("gameContainer").style.display = "none";

  // ⭐ 게임 UI 복구 (핵심)
  ui.style.display = "block";
  canvas.style.display = "block";
  document.getElementById("homeBtn").style.display = "block";
  video.style.display = "block";

  // ⭐ 상태 초기화
  openingClicked = false;
  answers = [];
  foundCount = 0;
  gameFinished = false;
}
</script>
